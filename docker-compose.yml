services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=admin@123
    ports:
      - "1433:1433"
    networks:
      - micro_net
    volumes:
      - sql_data:/var/opt/mssql

  productservice:
    build:
      context: ./
      dockerfile: ECommerce.ProductAPISolution/ProductAPI.Presentation/Dockerfile
    container_name: productservice
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
    networks:
      - micro_net

  orderservice:
    build:
      context: ./
      dockerfile: ECommerce.OrderAPISolution/OrderAPI.Presentation/Dockerfile
    container_name: orderservice
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
    networks:
      - micro_net
  
  authenticationservice:
    build:
      context: ./
      dockerfile: ECommerce.AuthenticationAPISolution/AuthenticationAPI.Presentation/Dockerfile
    container_name: authenticationservice
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
    networks:
      - micro_net

  apigatewayservice:
    build:
      context: ./
      dockerfile: ECommerce.APIGatewaySolution/APIGateway.Presentation/Dockerfile
    container_name: apigatewayservice
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development    
    networks:
      - micro_net

networks:
  micro_net:
    driver: bridge

volumes:
  sql_data: